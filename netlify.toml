# Netlify deployment config — Metcalf Partners A2P Compliance Site
# Deploy: drag the metcalf/ folder to app.netlify.com/drop

[build]
  publish = "."

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
